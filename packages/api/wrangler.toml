name = "moonwell-api"
main = "src/index.ts"
compatibility_date = "2025-04-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = true

# Custom domain — first deploy creates the route automatically as long as
# `moonwell.fi` is on the same Cloudflare account. Custom domains cover all
# paths automatically; wildcards and trailing /* are not allowed here.
[[routes]]
pattern = "api.moonwell.fi"
custom_domain = true

[vars]
ENVIRONMENT = "production"

# Runtime secrets are set out-of-band via `wrangler secret put`.
# DO NOT commit RPC URLs:
#   wrangler secret put BASE_RPC_URL
#   wrangler secret put OPTIMISM_RPC_URL
