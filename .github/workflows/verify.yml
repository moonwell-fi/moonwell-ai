name: Verify

on:
  workflow_call:

jobs:
  verify:
    name: Typecheck, test, build
    runs-on: blacksmith-4vcpu-ubuntu-2404
    timeout-minutes: 10
    steps:
      - name: Clone repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install dependencies
        uses: ./.github/actions/install-dependencies

      - name: Shared libs in sync (CLI ↔ API)
        run: node scripts/sync-shared-libs.mjs --check

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Lint web
        run: pnpm lint

      - name: Build web (smoke)
        run: pnpm --filter @moonwell-ai/web build

      - name: Build CLI (smoke)
        run: pnpm --filter @moonwell-fi/cli build

      - name: Worker dry-run (smoke)
        run: pnpm --filter @moonwell-ai/api build
