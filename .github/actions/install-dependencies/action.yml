name: Install dependencies
description: Set up pnpm and Node, then install with a frozen lockfile.

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      with:
        version: 9.1.0

    - name: Setup Node.js
      uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
      with:
        node-version: 22
        cache: pnpm

    - name: Install
      shell: bash
      run: pnpm install --frozen-lockfile
