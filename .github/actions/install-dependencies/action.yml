name: Install dependencies
description: Set up pnpm and Node, then install with a frozen lockfile.

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 9.1.0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm

    - name: Install
      shell: bash
      run: pnpm install --frozen-lockfile
